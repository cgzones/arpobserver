os: linux
dist: bionic
language: c

git:
  depth: 3


env:
  global:
   # The next declaration is the encrypted COVERITY_SCAN_TOKEN, created
   #   via the "travis encrypt" command using the project repo's public key
   - secure: ""


addons:
  apt:
    packages:
      - default-libmysqlclient-dev
      - libevent-dev
      - libpcap-dev
      - libsqlite3-dev
      - pkg-config
      - automake
  coverity_scan:
    project:
      name: "cgzones/arpobserver"
      description: "Build submitted via Travis CI"
    notification_email: cgzones@googlemail.com
    build_command_prepend: "./autogen.sh && ./configure --disable-man --disable-silent-rules --without-check --with-mysql --with-sqlite3 --enable-werror && make clean"
    build_command: "make"
    branch_pattern: coverity_scan


script:
  - cat "${TRAVIS_BUILD_DIR}/cov-int/scm_log.txt"
